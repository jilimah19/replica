<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <section>
        <div class="container">
            <div class="card">
                <div class="card-background">
                    <span class="card-background-1"></span>
                    <span class="card-background-2"></span>
                    <span class="card-background-3"></span>
                    <span class="card-background-4"></span>

                    <!--Login Form-->
                    <form>
                        <!-- Username/Email Field -->
                         <div class="form-group">
                            <label><img src="user-icon-svgrepo-com.svg" alt="user icon" height="20" width="20"><p>User Name/email</p></label>
                            <input type="email" id="username" required>
                        </div>
                        
                        <!-- Password Field -->
                         <div class="form-group border-colour">
                            <label class="icon icon-mail"><img src="lock-svgrepo-com.svg" alt="lock icon" height="20" width="20"> <p>Password</p></label>
                            <input type="password" id="password" required>
                        </div>
                        
                        <!-- Remember Me Checkbox (Bonus) -->
                         <div class="checkbox-group">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <!-- Login Button -->
                         <button type="submit" class="login-btn">LOGIN NOW <img src="angle-right-svgrepo-com.svg" alt="angle" height="35px" width="35px"></button>
                    </form>
                    <!-- Social Login Section -->
                     <div class="social-login">
                        <p>log in via</p>
                        <div class="social-icons">
                            <a href="#"><img src="facebook-svgrepo-com.svg" alt="facebook logo" height="20px" width="20px"></a>
                            <a href="#"><img src="instagram-color-svgrepo-com.svg" alt="instagram logo" height="20px" width="20px"></a>
                            <a href="#"><img src="twitter-svgrepo-com.svg" alt="twitter logo" height="20px" width="20px"></a>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </section>
</body>
</html>
