<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <section>
        <div class="container">
            <div class="card">
                <div class="card-background">
                    <span class="card-background-1"></span>
                    <span class="card-background-2"></span>
                    <span class="card-background-3"></span>
                    <span class="card-background-4"></span>

                    <!--Login Form-->
                    <form>
                        <!-- Username/Email Field -->
                         <div class="form-group">
                            <label for="username">User name / Email</label>
                            <input type="email" id="username" placeholder="Enter your email" required>
                        </div>
                        
                        <!-- Password Field -->
                         <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="Enter your password" required>
                        </div>

                        <!-- Remember Me Checkbox (Bonus) -->
                         <div class="checkbox-group">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <!-- Login Button -->
                         <button type="submit" class="login-btn">LOGIN NOW</button>
                        </form>

                </div>
            </div>
        </div>

    </section>
</body>
</html>
